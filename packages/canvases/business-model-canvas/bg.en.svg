<?xml version="1.0" encoding="UTF-8"?>
<!--
  English Business Model Canvas background.

  Replaced 2026-06-12: the original 702KB asset was the full Strategyzer
  template with pre-baked labels ("Key Partnerships", "Designed for / by",
  "Business Model Canvas" title, the Strategyzer logo, QR code, etc.).
  The PinGarden renderer overlays its own i18n zone labels on top, so
  the EN canvas ended up with overlapping labels + visible Strategyzer
  chrome bleeding into the zone areas. The ZH variant never had this
  problem because it's always been a clean 9-rect outline.

  Now both variants ship the same minimal shape: nine zone rects only,
  identical viewBox + coordinates to the manifest. Labels come from
  `i18n/{en,zh}.json`. If we ever want decorative chrome back, add it
  via the renderer (so it stays consistent across languages) — not
  baked into one bg.svg.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1190 842" width="1190" height="842" preserveAspectRatio="xMidYMid meet">
  <rect x="0" y="0" width="1190" height="842" fill="#FAFAF7"/>

  <g fill="none" stroke="#1F2937" stroke-width="1.5" vector-effect="non-scaling-stroke">
    <rect x="0"   y="0"   width="238" height="572"/>
    <rect x="238" y="0"   width="238" height="286"/>
    <rect x="238" y="286" width="238" height="286"/>
    <rect x="476" y="0"   width="238" height="572"/>
    <rect x="714" y="0"   width="238" height="286"/>
    <rect x="714" y="286" width="238" height="286"/>
    <rect x="952" y="0"   width="238" height="572"/>
    <rect x="0"   y="572" width="595" height="270"/>
    <rect x="595" y="572" width="595" height="270"/>
  </g>
</svg>
