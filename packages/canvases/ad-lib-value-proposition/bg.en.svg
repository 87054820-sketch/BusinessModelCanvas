<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ad-Lib Value Proposition Template (Strategyzer). A fill-in-the-blank
  sentence prototype for quickly shaping alternative value-proposition
  directions. Each blank is a click-able zone where the team drops sticky
  notes; the caption under each blank is rendered by ZoneLabel from the
  i18n bundle (so the labels translate without rewriting the SVG).

  The SVG itself contains:
    – a gray sidebar with the template's title + objective + outcome
      copy (language-specific)
    – the connector phrases (Our, help(s), who wants to, by, and, unlike)
      in large display type
    – the underline strokes that frame each blank
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" width="1200" height="1500" preserveAspectRatio="xMidYMid meet">
  <rect x="0" y="0" width="1200" height="1500" fill="#FAFAF7"/>

  <!-- ─────────────── Left sidebar (info pane) ─────────────── -->
  <rect x="0" y="0" width="240" height="1500" fill="#E5E7EB"/>

  <g font-family="Inter, system-ui, sans-serif" fill="#111827">
    <text x="40" y="100" font-size="28" font-weight="500">Ad-Lib</text>
    <text x="40" y="135" font-size="28" font-weight="500">Value</text>
    <text x="40" y="170" font-size="28" font-weight="500">Proposition</text>
    <text x="40" y="205" font-size="28" font-weight="500">Template</text>
  </g>

  <g font-family="Inter, system-ui, sans-serif" fill="#374151" font-size="13">
    <text x="40" y="280">Ad-libs are a great</text>
    <text x="40" y="298">way to quickly shape</text>
    <text x="40" y="316">alternative directions</text>
    <text x="40" y="334">for your value proposition.</text>

    <text x="40" y="370">They force you to pinpoint</text>
    <text x="40" y="388">how exactly you are</text>
    <text x="40" y="406">going to create value.</text>
    <text x="40" y="424">Prototype three to five</text>
    <text x="40" y="442">different directions by</text>
    <text x="40" y="460">filling out the blanks in</text>
    <text x="40" y="478">the ad-lib on the right.</text>
  </g>

  <g font-family="Inter, system-ui, sans-serif">
    <text x="40" y="540" font-size="14" font-weight="600" fill="#111827">Objective</text>
    <text x="40" y="565" font-size="13" fill="#374151">Quickly shape potential</text>
    <text x="40" y="583" font-size="13" fill="#374151">value proposition directions.</text>
  </g>

  <g font-family="Inter, system-ui, sans-serif">
    <text x="40" y="640" font-size="14" font-weight="600" fill="#111827">Outcome</text>
    <text x="40" y="665" font-size="13" fill="#374151">Alternative prototypes</text>
    <text x="40" y="683" font-size="13" fill="#374151">in the form of "pitchable"</text>
    <text x="40" y="701" font-size="13" fill="#374151">sentences.</text>
  </g>

  <!-- ─────────────── Right form (sentence) ─────────────── -->
  <g font-family="Inter, system-ui, sans-serif" fill="#111827" font-weight="400">
    <!-- Row 1: Our [Products and Services] -->
    <text x="300" y="200" font-size="42">Our</text>
    <line x1="380" y1="240" x2="1140" y2="240" stroke="#1F2937" stroke-width="1.5"/>

    <!-- Row 2: help(s) [Customer Segment] -->
    <text x="300" y="380" font-size="42">help(s)</text>
    <line x1="440" y1="420" x2="1140" y2="420" stroke="#1F2937" stroke-width="1.5"/>

    <!-- Row 3: who wants to [Jobs to be done] -->
    <text x="300" y="560" font-size="42">who wants to</text>
    <line x1="590" y1="600" x2="1140" y2="600" stroke="#1F2937" stroke-width="1.5"/>

    <!-- Row 4: by [verb] [customer pain] -->
    <text x="300" y="740" font-size="42">by</text>
    <line x1="380" y1="780" x2="720"  y2="780" stroke="#1F2937" stroke-width="1.5"/>
    <line x1="760" y1="780" x2="1140" y2="780" stroke="#1F2937" stroke-width="1.5"/>

    <!-- Row 5: and [verb] [customer gain] -->
    <text x="300" y="920" font-size="42">and</text>
    <line x1="380" y1="960" x2="720"  y2="960" stroke="#1F2937" stroke-width="1.5"/>
    <line x1="760" y1="960" x2="1140" y2="960" stroke="#1F2937" stroke-width="1.5"/>

    <!-- Row 6: unlike [competing value proposition] -->
    <text x="300" y="1100" font-size="42">unlike</text>
    <line x1="440" y1="1140" x2="1140" y2="1140" stroke="#1F2937" stroke-width="1.5"/>
  </g>

  <!-- Footer -->
  <text x="300" y="1450" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6B7280">
    Inspired by the Strategyzer Ad-Lib Value Proposition Template.
  </text>
</svg>
