<?xml version="1.0" encoding="UTF-8"?>
<!--
  Business Model Environment — Strategyzer's "what's outside the BMC".
  Four sticky-bearing zones arranged as a compass around a small,
  decorative BMC reference at center. The reference is just a 5×2 mini
  grid with the canonical block letters (KP, KA, VP, CR, CS, KR, CH,
  C$, R$) — it sits in a NON-zone area (centre 440–840 × 260–620) so
  it can never accidentally hold a sticky.
  The four outer axis labels (FORESIGHT, MARKET ANALYSIS, MACROECONOMICS,
  COMPETITIVE ANALYSIS) hug the canvas edges, faint, to mirror the
  Strategyzer reference image's intent: each force is one of the four
  lenses through which you analyse the surroundings.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 880" width="1280" height="880" preserveAspectRatio="xMidYMid meet">
  <rect x="0" y="0" width="1280" height="880" fill="#FAFAF7"/>

  <!-- ── Outer axis labels ── -->
  <g font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#9CA3AF" letter-spacing="4" text-anchor="middle">
    <text x="640" y="22">— FORESIGHT —</text>
    <text x="640" y="868">— MACROECONOMICS —</text>
    <text x="20" y="440" transform="rotate(-90 20 440)">— COMPETITIVE ANALYSIS —</text>
    <text x="1260" y="440" transform="rotate(90 1260 440)">— MARKET ANALYSIS —</text>
  </g>

  <!-- ── Four force zones ── -->
  <g fill="none" stroke="#1F2937" stroke-width="1.5" vector-effect="non-scaling-stroke">
    <rect x="40"  y="40"  width="1200" height="200"/>  <!-- Key Trends -->
    <rect x="40"  y="260" width="380"  height="360"/>  <!-- Industry Forces -->
    <rect x="860" y="260" width="380"  height="360"/>  <!-- Market Forces -->
    <rect x="40"  y="640" width="1200" height="200"/>  <!-- Macroeconomic Forces -->
  </g>

  <!-- Sub-category hints baked into each zone, just under the title.
       Italic, faint — visible until a sticky covers it. The Strategyzer
       reference image uses radial labels; we collapse them to a single
       comma-separated line so they don't compete for sticky placement. -->
  <g font-family="Inter, system-ui, sans-serif" font-size="14" font-style="italic" fill="#9CA3AF">
    <text x="70"  y="108">Technology · Regulatory · Societal &amp; cultural · Socioeconomic</text>
    <text x="60"  y="320">Suppliers · Stakeholders</text>
    <text x="60"  y="340">Competitors · New entrants</text>
    <text x="60"  y="360">Substitute products &amp; services</text>
    <text x="880" y="320">Market segments · Needs &amp; demands</text>
    <text x="880" y="340">Market issues · Switching costs</text>
    <text x="880" y="360">Revenue attractiveness</text>
    <text x="70"  y="713">Global market conditions · Capital markets · Commodities &amp; resources · Economic infrastructure</text>
  </g>

  <!-- Inward-pointing triangles at each force's inner edge — visualises
       "external pressure inward toward the BMC at center". Decorative. -->
  <g fill="#9CA3AF">
    <polygon points="640,232 632,220 648,220"/>      <!-- top zone ▼ -->
    <polygon points="640,648 632,660 648,660"/>      <!-- bottom zone ▲ -->
    <polygon points="428,440 416,432 416,448"/>      <!-- left zone ▶ -->
    <polygon points="852,440 864,432 864,448"/>      <!-- right zone ◀ -->
  </g>

  <!-- ── Centre BMC reference (decorative, non-zone) ──
       Frame 480-800 × 360-520 (320×160). 5 columns of width 64. The 9
       BMC blocks: KP | KA/KR | VP | CR/CH | CS  on top (height 100),
       and C$ + R$ on the bottom row (height 60). -->
  <g fill="none" stroke="#1F2937" stroke-width="1" vector-effect="non-scaling-stroke">
    <rect x="480" y="360" width="320" height="160"/>
    <line x1="544" y1="360" x2="544" y2="520"/>
    <line x1="608" y1="360" x2="608" y2="460"/>
    <line x1="672" y1="360" x2="672" y2="460"/>
    <line x1="736" y1="360" x2="736" y2="520"/>
    <line x1="480" y1="460" x2="800" y2="460"/>
    <line x1="544" y1="410" x2="608" y2="410"/>
    <line x1="672" y1="410" x2="736" y2="410"/>
    <line x1="640" y1="460" x2="640" y2="520"/>
  </g>
  <g font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">
    <text x="512" y="388">KP</text>
    <text x="576" y="383">KA</text>
    <text x="576" y="437">KR</text>
    <text x="640" y="388">VP</text>
    <text x="704" y="383">CR</text>
    <text x="704" y="437">CH</text>
    <text x="768" y="388">CS</text>
    <text x="560" y="494">C$</text>
    <text x="720" y="494">R$</text>
  </g>
  <text x="640" y="544" font-family="Inter, system-ui, sans-serif" font-size="13" font-style="italic" fill="#6B7280" text-anchor="middle">Your Business Model</text>
</svg>
