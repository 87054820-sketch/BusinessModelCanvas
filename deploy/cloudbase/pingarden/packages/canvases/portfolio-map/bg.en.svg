<?xml version="1.0" encoding="UTF-8"?>
<!--
  Portfolio Map (Strategyzer "Innovation Portfolio Map" / "Business Model
  Portfolio") placeholder. Two halves arranged DIAGONALLY:
    – EXPLORE: lower-left  (innovation projects you're testing)
    – EXPLOIT: upper-right (existing businesses you're operating)
  The diagonal arrangement visualises "graduating up": ideas tested in
  EXPLORE eventually transfer up-right into EXPLOIT.
  Each half is its own 2D quadrant chart with dashed cross-dividers; the
  axisGrid plugin (apps/web/src/plugins/axisGrid) draws labelled X/Y arrows
  over each half at runtime.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 880" width="1280" height="880" preserveAspectRatio="xMidYMid meet">
  <rect x="0" y="0" width="1280" height="880" fill="#FAFAF7"/>

  <defs>
    <marker id="transfer-arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L8,4 Z" fill="#1F2937"/>
    </marker>
  </defs>

  <!-- EXPLORE (lower-left) — testing new business models -->
  <g fill="none" stroke="#1F2937" stroke-width="1.5" vector-effect="non-scaling-stroke">
    <rect x="80" y="440" width="560" height="380"/>
    <line x1="360" y1="440" x2="360" y2="820" stroke-dasharray="6 4" stroke="#9CA3AF"/>
    <line x1="80"  y1="630" x2="640" y2="630" stroke-dasharray="6 4" stroke="#9CA3AF"/>
  </g>

  <!-- "SEARCH ↗" emphasis label inside EXPLORE: amber to convey
       the search/discovery action this half is centred on. The diagonal
       arrow reinforces the up-right journey toward higher return / lower risk. -->
  <text x="360" y="642"
        font-family="Inter, system-ui, sans-serif"
        font-size="36"
        font-weight="800"
        letter-spacing="3"
        fill="#B45309"
        text-anchor="middle"
        opacity="0.45">SEARCH ↗</text>

  <!-- EXPLOIT (upper-right) — operating existing business models -->
  <g fill="none" stroke="#1F2937" stroke-width="1.5" vector-effect="non-scaling-stroke">
    <rect x="640" y="60" width="560" height="380"/>
    <line x1="920" y1="60"  x2="920"  y2="440" stroke-dasharray="6 4" stroke="#9CA3AF"/>
    <line x1="640" y1="250" x2="1200" y2="250" stroke-dasharray="6 4" stroke="#9CA3AF"/>
  </g>

  <!-- "GROW ↗" emphasis label inside EXPLOIT: emerald to convey
       the growth action this half is centred on. -->
  <text x="920" y="262"
        font-family="Inter, system-ui, sans-serif"
        font-size="36"
        font-weight="800"
        letter-spacing="3"
        fill="#047857"
        text-anchor="middle"
        opacity="0.45">GROW ↗</text>

  <!-- Transfer arrow: graduates an idea from EXPLORE up-right into EXPLOIT.
       Crosses the shared corner at (640, 440). -->
  <g>
    <line x1="600" y1="480" x2="680" y2="400" stroke="#1F2937" stroke-width="2"
          marker-end="url(#transfer-arrow)" vector-effect="non-scaling-stroke" fill="none"/>
    <text x="690" y="462" font-family="Inter, system-ui, sans-serif" font-size="13" font-style="italic" fill="#374151">Transfer</text>
  </g>
</svg>
