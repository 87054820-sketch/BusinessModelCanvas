  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#9CA3AF">
    <text x="60" y="195">在旅程的这一阶段,</text>
    <text x="60" y="212">客户真正需要什么?</text>

    <text x="60" y="435">如果对这一刻拍快照,</text>
    <text x="60" y="452">画面里会有什么?</text>

    <text x="60" y="725">客户在这一刻的</text>
    <text x="60" y="742">感受如何?</text>
  </g>

  <g vector-effect="non-scaling-stroke">
    <circle cx="100" cy="775" r="14" fill="#FAFAF7" stroke="#1F2937" stroke-width="1.2"/>
    <circle cx="95"  cy="772" r="1.5" fill="#1F2937"/>
    <circle cx="105" cy="772" r="1.5" fill="#1F2937"/>
    <path d="M 93 780 Q 100 786 107 780" fill="none" stroke="#1F2937" stroke-width="1.2" stroke-linecap="round"/>
    <text x="125" y="780" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#374151">开心</text>

    <circle cx="100" cy="815" r="14" fill="#FAFAF7" stroke="#1F2937" stroke-width="1.2"/>
    <circle cx="95"  cy="812" r="1.5" fill="#1F2937"/>
    <circle cx="105" cy="812" r="1.5" fill="#1F2937"/>
    <line x1="93" y1="822" x2="107" y2="822" stroke="#1F2937" stroke-width="1.2" stroke-linecap="round"/>
    <text x="125" y="820" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#374151">平淡</text>

    <circle cx="100" cy="855" r="14" fill="#FAFAF7" stroke="#1F2937" stroke-width="1.2"/>
    <circle cx="95"  cy="852" r="1.5" fill="#1F2937"/>
    <circle cx="105" cy="852" r="1.5" fill="#1F2937"/>
    <path d="M 93 864 Q 100 858 107 864" fill="none" stroke="#1F2937" stroke-width="1.2" stroke-linecap="round"/>
    <text x="125" y="860" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#374151">受挫</text>
