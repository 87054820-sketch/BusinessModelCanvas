<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900" preserveAspectRatio="xMidYMid meet">
  <rect x="0" y="0" width="1400" height="900" fill="#FAFAF7"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <text x="40" y="52" font-size="13" font-style="italic" fill="#6B7280">当 ___,我想 ___,从而我能 ___</text>
  </g>

  <g fill="none" stroke="#1F2937" stroke-width="1.5" vector-effect="non-scaling-stroke">
    <rect x="40"  y="80" width="420" height="500"/>
    <rect x="490" y="80" width="420" height="500"/>
    <rect x="940" y="80" width="420" height="500"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#6B7280">
    <text x="60"  y="148">情境 · 触发条件</text>
    <text x="510" y="148">动机 · 想做的事</text>
    <text x="960" y="148">进展 · 想达到的结果</text>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#9CA3AF">
    <text x="60"  y="178">刚刚发生了什么?</text>
    <text x="60"  y="195">是什么触发了此刻的需求?</text>

    <text x="510" y="178">客户想做什么?</text>
    <text x="510" y="195">用动词开头。</text>

    <text x="960" y="178">客户想取得什么样的进展?</text>
    <text x="960" y="195">「成功」长什么样、感觉如何?</text>
  </g>

  <g fill="none" stroke="#1F2937" stroke-width="1.5" vector-effect="non-scaling-stroke">
    <rect x="40" y="600" width="1320" height="280"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <text x="60" y="668" font-size="13" fill="#6B7280">上面每一条功能性工作故事,至少配一条情感任务 + 一条社交任务。</text>
    <text x="60" y="700" font-size="12" fill="#9CA3AF">情感 — 客户想感受到什么?(例如「月结那一周心定下来」)</text>
    <text x="60" y="717" font-size="12" fill="#9CA3AF">社交 — 客户希望被怎么看待?(例如「成为产品评审从不延期的那个 PM」)</text>
  </g>

  <g stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4 4" vector-effect="non-scaling-stroke">
    <line x1="700" y1="730" x2="700" y2="870"/>
  </g>
  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">
    <text x="370"  y="745">情感</text>
    <text x="1030" y="745">社交</text>
  </g>
</svg>
