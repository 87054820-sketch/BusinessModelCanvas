<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" width="1200" height="1500" preserveAspectRatio="xMidYMid meet">
  <rect x="0" y="0" width="1200" height="1500" fill="#FAFAF7"/>

  <rect x="0" y="0" width="240" height="1500" fill="#E5E7EB"/>

  <g font-family="Inter, 'PingFang SC', system-ui, sans-serif" fill="#111827">
    <text x="40" y="100" font-size="26" font-weight="500">价值主张</text>
    <text x="40" y="135" font-size="26" font-weight="500">速写模版</text>
  </g>

  <g font-family="Inter, 'PingFang SC', system-ui, sans-serif" fill="#374151" font-size="13">
    <text x="40" y="200">速写句式是一种快速勾勒</text>
    <text x="40" y="220">备选价值主张方向的好方法。</text>

    <text x="40" y="260">它会迫使你精确定位</text>
    <text x="40" y="280">自己究竟将如何创造价值。</text>
    <text x="40" y="300">在右侧的句式中填空,</text>
    <text x="40" y="320">原型化三到五个不同方向。</text>
  </g>

  <g font-family="Inter, 'PingFang SC', system-ui, sans-serif">
    <text x="40" y="400" font-size="14" font-weight="600" fill="#111827">目标</text>
    <text x="40" y="425" font-size="13" fill="#374151">快速勾勒可能的</text>
    <text x="40" y="443" font-size="13" fill="#374151">价值主张方向。</text>
  </g>

  <g font-family="Inter, 'PingFang SC', system-ui, sans-serif">
    <text x="40" y="500" font-size="14" font-weight="600" fill="#111827">产出</text>
    <text x="40" y="525" font-size="13" fill="#374151">以"可推介"句式</text>
    <text x="40" y="543" font-size="13" fill="#374151">呈现的备选原型。</text>
  </g>

  <!-- Right form: Chinese ad-lib sentence -->
  <g font-family="Inter, 'PingFang SC', system-ui, sans-serif" fill="#111827" font-weight="400">
    <!-- 我们的 [产品与服务] -->
    <text x="300" y="200" font-size="42">我们的</text>
    <line x1="380" y1="240" x2="1140" y2="240" stroke="#1F2937" stroke-width="1.5"/>

    <!-- 帮助 [客户细分] -->
    <text x="300" y="380" font-size="42">帮助</text>
    <line x1="440" y1="420" x2="1140" y2="420" stroke="#1F2937" stroke-width="1.5"/>

    <!-- 想要完成 [客户任务] -->
    <text x="300" y="560" font-size="42">想要完成</text>
    <line x1="590" y1="600" x2="1140" y2="600" stroke="#1F2937" stroke-width="1.5"/>

    <!-- 通过 [动词] [客户痛点] -->
    <text x="300" y="740" font-size="42">通过</text>
    <line x1="380" y1="780" x2="720"  y2="780" stroke="#1F2937" stroke-width="1.5"/>
    <line x1="760" y1="780" x2="1140" y2="780" stroke="#1F2937" stroke-width="1.5"/>

    <!-- 以及 [动词] [客户收益] -->
    <text x="300" y="920" font-size="42">以及</text>
    <line x1="380" y1="960" x2="720"  y2="960" stroke="#1F2937" stroke-width="1.5"/>
    <line x1="760" y1="960" x2="1140" y2="960" stroke="#1F2937" stroke-width="1.5"/>

    <!-- 不同于 [竞争价值主张] -->
    <text x="300" y="1100" font-size="42">不同于</text>
    <line x1="440" y1="1140" x2="1140" y2="1140" stroke="#1F2937" stroke-width="1.5"/>
  </g>

  <text x="300" y="1450" font-family="Inter, 'PingFang SC', system-ui, sans-serif" font-size="12" fill="#6B7280">
    灵感来自 Strategyzer 价值主张速写模版。
  </text>
</svg>
