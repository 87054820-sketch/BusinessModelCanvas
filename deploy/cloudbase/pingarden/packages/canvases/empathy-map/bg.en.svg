<?xml version="1.0" encoding="UTF-8"?>
<!--
  Empathy Map (XPLANE convention) — diagonal X dividers create 4 triangular
  wedges (Think&Feel top, See right, Say&Do bottom, Hear left). A face
  silhouette anchors the center, masking the X intersection. A persona
  fill-in strip rides at the top for the team to write the name + role
  + brief context. Pain/Gain is one merged row at the bottom with a
  vertical divider.

  Layout (1200 × 950):
    persona     : (40, 20)  → (1160, 100)   ← drop-a-sticky strip
    upper rect  : (40, 120) → (1160, 720)   ← X diagonals split into 4 wedges
    pain/gain   : (40, 740) → (1160, 920)   ← single rect, internal vertical divider
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950" width="1200" height="950" preserveAspectRatio="xMidYMid meet">
  <rect x="0" y="0" width="1200" height="950" fill="#FAFAF7"/>

  <!-- Persona strip (top): empty rect — ZoneLabel renders the translated
       title "Persona" at top-left, and users drop a sticky inside with
       the actual name + role + context. -->
  <g fill="none" stroke="#1F2937" stroke-width="1.5" vector-effect="non-scaling-stroke">
    <rect x="40" y="20" width="1120" height="80"/>
  </g>

  <!-- Upper rect with X diagonals (4 triangle wedges meeting at the head) -->
  <g fill="none" stroke="#1F2937" stroke-width="1.5" vector-effect="non-scaling-stroke">
    <rect x="40" y="120" width="1120" height="600"/>
    <line x1="40"   y1="120" x2="1160" y2="720"/>
    <line x1="1160" y1="120" x2="40"   y2="720"/>
  </g>

  <!-- Persona face anchor at the X intersection (decorative) -->
  <!-- Tiny ears (drawn first so the head overlaps them) -->
  <circle cx="528" cy="420" r="8" fill="#FAFAF7" stroke="#1F2937" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
  <circle cx="672" cy="420" r="8" fill="#FAFAF7" stroke="#1F2937" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
  <!-- Head -->
  <circle cx="600" cy="420" r="72" fill="#FAFAF7" stroke="#1F2937" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
  <!-- Eyes -->
  <circle cx="582" cy="412" r="3" fill="#1F2937"/>
  <circle cx="618" cy="412" r="3" fill="#1F2937"/>
  <!-- Right-eye eyelash curl (XPLANE-style) -->
  <path d="M 624 406 Q 628 400 633 402" fill="none" stroke="#1F2937" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M 588 442 Q 600 452 612 442" fill="none" stroke="#1F2937" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pain / Gain merged rect at the bottom, with internal vertical divider -->
  <g fill="none" stroke="#1F2937" stroke-width="1.5" vector-effect="non-scaling-stroke">
    <rect x="40"  y="740" width="1120" height="180"/>
    <line x1="600" y1="740" x2="600" y2="920"/>
  </g>
</svg>
